# Test Environment Configuration
# This configuration is used for testing purposes only.

# IMPORTANT: Storage Isolation for Integration Tests
# Each integration test now uses its own isolated storage directory to ensure:
# 1. Test Isolation: Tests do not interfere with each other's data
# 2. Parallel Execution Safety: Tests can run in parallel without conflicts
# 3. Clean State: Each test starts with a fresh storage state
#
# The storage path is dynamically set via the STORAGE_DIR environment variable
# by CLIRunner.setStorageDir() in each test's beforeEach hook.
# The default dbPath here is used as a fallback when STORAGE_DIR is not set.

[storage]
type = "sqlite"

[storage.sqlite]
# Default storage directory (fallback when STORAGE_DIR env var is not set)
# Each test uses its own subdirectory under __tests__/outputs/{test-name}/
dbPath = "./__tests__/storage/test.db"
enableWAL = false
enableLogging = false
readonly = false
fileMustExist = false
timeout = 5000

[output]
dir = "./__tests__/outputs"
logFilePattern = "cli-app-{date}.log"
enableLogTerminal = false
enableSDKLogs = false
sdkLogLevel = "silent"

[presets.contextCompression]
enabled = true

[presets.predefinedTools]
enabled = true

[presets.predefinedPrompts]
enabled = true

# Minimal workflow section required by the SDK config parser
[workflow]
id = "test-config-placeholder"
name = "Test Config Placeholder"
version = "1.0.0"

[[workflow.nodes]]
id = "start"
type = "START"

[[workflow.nodes]]
id = "end"
type = "END"

[[workflow.edges]]
from = "start"
to = "end"