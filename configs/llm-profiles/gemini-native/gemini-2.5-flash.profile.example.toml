# Gemini 2.5 Flash — Fast
#
# Google's fast, cost-efficient model. Good for high-throughput
# classification, extraction, and simpler agent tasks.

id = "gemini-2.5-flash"
name = "Gemini 2.5 Flash"
provider = "GEMINI_NATIVE"
model = "gemini-2.5-flash"
apiKey = "${GEMINI_API_KEY}"
timeout = 30000
maxRetries = 2
retryDelay = 1000

[parameters]
temperature = 0.5
maxTokens = 8192
topP = 0.95

[metadata]
tags = ["gemini", "gemini-flash", "fast", "cheap"]