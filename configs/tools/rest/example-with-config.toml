# REST Tool Configuration Example
# This file demonstrates how to configure a REST tool with executor-level settings

# Basic Tool Information
name = "example_api"
tool_type = "rest"
description = "Example REST tool demonstrating configuration options"
enabled = true
timeout = 30

# ============================================================================
# Executor-Level Configuration (Optional)
# These settings override the global RestExecutor defaults for this specific tool
# ============================================================================
[config]
# Base URL for all requests (optional, can also be specified in runtime parameters)
baseUrl = "https://api.example.com/v1"

# Default headers to include in every request (optional)
[config.headers]
Authorization = "Bearer ${API_KEY}"
Accept = "application/json"

# Request timeout in milliseconds (overrides global default)
timeout = 60000

# Retry configuration
maxRetries = 3
retryDelay = 1000

# ============================================================================
# Parameter Schema Definition
# Defines what parameters the LLM can pass to this tool
# ============================================================================
[parameters_schema]
type = "object"

[parameters_schema.properties]
endpoint = { type = "string", description = "API endpoint path (e.g., /users, /posts)" }
method = { type = "string", description = "HTTP method", enum = ["GET", "POST", "PUT", "DELETE"], default = "GET" }
query_params = { type = "object", description = "Query parameters to append to the URL" }
body = { type = "object", description = "Request body for POST/PUT requests" }

parameters_schema.required = ["endpoint"]

# ============================================================================
# Metadata
# Additional information about the tool
# ============================================================================
[metadata]
category = "api"
tags = ["rest", "http", "api"]
risk_level = "medium"
