# Metrics Configuration Example
# 
# This file demonstrates how to configure the metrics system.
# Copy this file to configs/metrics.toml to enable custom metrics configuration.
#
# Configuration Priority (highest to lowest):
# 1. SDKOptions.metrics (programmatic override)
# 2. Config file (configs/metrics.toml or metrics.json)
# 3. Environment-specific defaults (development/production)
# 4. Hardcoded defaults (current values as fallback)

# Global metrics settings
enabled = true
enablePeriodicReporting = false
reportingInterval = 60000  # 1 minute

# Workflow execution metrics
[workflowMetrics]
bufferSize = 100
flushInterval = 5000
enablePeriodicReporting = false

# Node execution metrics - higher buffer for frequent operations
[nodeMetrics]
bufferSize = 200
flushInterval = 3000
enablePeriodicReporting = false

# Agent iteration metrics
[agentMetrics]
bufferSize = 100
flushInterval = 5000
enablePeriodicReporting = false

# Event processing metrics - high volume, larger buffer
[eventMetrics]
bufferSize = 500
flushInterval = 2000
enablePeriodicReporting = false

# Tool invocation metrics
[toolMetrics]
bufferSize = 100
flushInterval = 5000
enablePeriodicReporting = false

# Token usage metrics
[tokenMetrics]
bufferSize = 50
flushInterval = 10000
enablePeriodicReporting = false

# Template rendering metrics
[templateMetrics]
bufferSize = 100
flushInterval = 5000
enablePeriodicReporting = false

# Configuration operation metrics
[configMetrics]
bufferSize = 100
flushInterval = 5000
enablePeriodicReporting = false

# Error occurrence metrics - immediate flush for critical errors
[errorMetrics]
bufferSize = 10
flushInterval = 1000
enablePeriodicReporting = false

# Resource utilization metrics
[resourceMetrics]
bufferSize = 100
flushInterval = 5000
enablePeriodicReporting = false

# Agent loop metrics
[agentLoopMetrics]
bufferSize = 100
flushInterval = 5000
enablePeriodicReporting = false
