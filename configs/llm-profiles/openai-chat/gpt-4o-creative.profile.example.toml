# GPT-4o — Creative (high-temperature preset)
#
# Use for brainstorming, content generation, and creative writing tasks
# where variety and divergent thinking are desired.

id = "gpt-4o"
name = "GPT-4o Creative"
provider = "OPENAI_CHAT"
model = "gpt-4o"
apiKey = "${OPENAI_API_KEY}"
baseUrl = "https://api.openai.com/v1"
timeout = 60000
maxRetries = 3
retryDelay = 1000

[parameters]
temperature = 1.0
maxTokens = 8192
topP = 0.95
frequencyPenalty = 0.2
presencePenalty = 0.3

[metadata]
tags = ["openai", "gpt-4o", "creative", "generation"]