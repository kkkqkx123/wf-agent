# Presets Configuration Example
#
# Controls which predefined resources are enabled at startup.
#
# Type: packages/types/src/config/presets.ts → PresetsConfig
# Schema: packages/types/src/config/schemas.ts → PresetsConfigSchema

[contextCompression]
enabled = true
timeout = 30000                       # Compression timeout in ms
maxTriggers = 10                      # Max compression triggers per session

[predefinedTools]
enabled = true
# allowList = []                      # Uncomment to restrict to specific tools
# blockList = []                      # Uncomment to exclude specific tools

[predefinedTools.config.readFile]
workspaceDir = "./"
maxFileSize = 10485760                # 10MB

[predefinedTools.config.writeFile]
workspaceDir = "./"

[predefinedTools.config.editFile]
workspaceDir = "./"

[predefinedTools.config.bash]
defaultTimeout = 30000
maxTimeout = 120000

[predefinedTools.config.sessionNote]
workspaceDir = "./"
memoryFile = ".agent/session-memory.json"

[predefinedTools.config.backgroundShell]
workspaceDir = "./"

[predefinedPrompts]
enabled = true