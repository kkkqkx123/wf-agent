# GPT-4o — Balanced (default preset)
#
# All-purpose model suitable for most agent and workflow tasks.
#
# Provider: OPENAI_CHAT
# Model: gpt-4o (latest stable, 2026-05-xx snapshot)

id = "gpt-4o"
name = "GPT-4o Balanced"
provider = "OPENAI_CHAT"
model = "gpt-4o"
apiKey = "${OPENAI_API_KEY}"
baseUrl = "https://api.openai.com/v1"
timeout = 60000
maxRetries = 3
retryDelay = 1000

[parameters]
temperature = 0.7
maxTokens = 4096
topP = 0.95
frequencyPenalty = 0.0
presencePenalty = 0.0

[metadata]
tags = ["openai", "gpt-4o", "balanced", "production"]